services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: jogai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jogai_secure_2026}
      POSTGRES_DB: jogai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jogai"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    env_file:
      - ./backend/.env.prod
    environment:
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  # bot service removed — bot now runs via webhook through backend
  # bot:
  #   build: ./backend
  #   restart: unless-stopped
  #   command: python -m app.bot.polling
  #   env_file:
  #     - ./backend/.env.prod
  #   environment:
  #     - ENVIRONMENT=production
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # slotopol: temporarily disabled — repo structure changed, slots already in seed
  # slotopol:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.slotopol
  #   restart: unless-stopped

  celery-worker:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app:celery worker --loglevel=info -Q jogai --concurrency=2
    env_file:
      - ./backend/.env.prod
    environment:
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  celery-beat:
    build: ./backend
    restart: unless-stopped
    command: celery -A app.celery_app:celery beat --loglevel=info
    env_file:
      - ./backend/.env.prod
    environment:
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  miniapp:
    build: ./miniapp
    restart: unless-stopped
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  landing:
    build: ./landing
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:8000/api
    depends_on:
      - backend
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - landing
      - miniapp
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
