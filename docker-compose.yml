services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: jogai
      POSTGRES_PASSWORD: jogai_secure_2026
      POSTGRES_DB: jogai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jogai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - ./backend/.env
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: ./backend
    command: python -m app.bot.polling
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build: ./backend
    command: celery -A app.celery_app:celery worker --loglevel=info -Q jogai --concurrency=2
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-beat:
    build: ./backend
    command: celery -A app.celery_app:celery beat --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Mini App (phase 2 — uncomment when needed)
  # miniapp:
  #   build: ./miniapp
  #   depends_on:
  #     - backend

  landing:
    build: ./landing
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:8000/api
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - default
      - shared
    depends_on:
      - backend
      - landing

networks:
  shared:
    name: shared_proxy
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
